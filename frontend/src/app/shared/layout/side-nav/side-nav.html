<aside
  class="glass-brand z-30 flex shrink-0 flex-col text-white lg:h-dvh lg:w-64"
>
  <div class="flex items-center justify-between gap-3 border-b border-white/10 px-3 py-2 lg:hidden">
    <div class="flex min-w-0 items-center gap-2">
      <img src="/logo.svg" alt="LPU Laguna" class="h-9 w-9 shrink-0 object-contain" />
      <div class="min-w-0">
        <p class="truncate text-xs font-black uppercase tracking-wide">LPU Laguna</p>
        <p class="truncate text-[11px] text-white/65">{{ user()?.fullname ?? 'Account' }}</p>
      </div>
    </div>

    <div class="flex shrink-0 items-center gap-2">
      <button
        type="button"
        (click)="toggleTheme()"
        [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
        [title]="isDark() ? 'Light mode' : 'Dark mode'"
        class="flex h-10 w-10 cursor-pointer items-center justify-center rounded-xl bg-white/10 text-white hover:bg-white/20 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-white/50"
      >
        <ui-icon [name]="isDark() ? 'light_mode' : 'dark_mode'" class="text-xl" />
      </button>

      <button
        type="button"
        (click)="logout()"
        aria-label="Logout"
        title="Logout"
        class="flex h-10 w-10 cursor-pointer items-center justify-center rounded-xl bg-white/10 text-white hover:bg-white/20 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-white/50"
      >
        <ui-icon name="logout" class="text-xl" />
      </button>
    </div>
  </div>

  <div class="hidden items-center gap-3 px-5 py-6 lg:flex">
    <img src="/logo.svg" alt="LPU Laguna" class="h-14 w-14 object-contain" />
    <div class="min-w-0">
      <p class="truncate text-sm font-black uppercase tracking-wide">LPU Laguna</p>
      <p class="text-xs text-white/60">Reservation System</p>
    </div>
  </div>

  <nav
    class="flex gap-1 overflow-x-auto px-3 py-2 lg:flex-1 lg:flex-col lg:overflow-visible lg:py-0"
  >
    @for (item of nav; track item.label) {
      <a
        [routerLink]="item.link"
        routerLinkActive="bg-secondary text-white shadow-lg"
        #rla="routerLinkActive"
        class="flex min-w-fit cursor-pointer items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-white/80"
        [class.hover:bg-white/10]="!rla.isActive"
      >
        <ui-icon [name]="item.icon" class="text-xl" />
        <span class="hidden sm:inline">{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="mt-auto hidden border-t border-white/15 px-3 py-4 lg:block">
    <a
      href="#"
      class="flex cursor-pointer items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-white/80 hover:bg-white/10"
    >
      <ui-icon name="account_circle" class="text-xl" />
      <span>{{ user()?.fullname ?? 'Account' }}</span>
    </a>
    <button
      type="button"
      (click)="toggleTheme()"
      class="flex w-full cursor-pointer items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-white/80 hover:bg-white/10"
    >
      <ui-icon [name]="isDark() ? 'light_mode' : 'dark_mode'" class="text-xl" />
      <span>{{ isDark() ? 'Light Mode' : 'Dark Mode' }}</span>
    </button>
    <button
      type="button"
      (click)="logout()"
      class="flex w-full cursor-pointer items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-white/80 hover:bg-white/10"
    >
      <ui-icon name="logout" class="text-xl" />
      <span>Logout</span>
    </button>
  </div>
</aside>
