<div class="flex min-h-dvh w-full flex-col bg-gray-100 text-black lg:flex-row">
  <app-side-nav />

  <main class="flex min-h-0 flex-1 flex-col gap-5 overflow-auto p-4 sm:p-6">
    <section class="grid shrink-0 grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">
      @for (s of stats; track s.label) {
        <div class="surface rounded-2xl p-4 shadow-sm">
          <div class="flex items-start justify-between">
            <div class="flex flex-col gap-1.5">
              <span class="text-sm font-medium text-gray-400">{{ s.label }}</span>
              <span class="text-3xl font-extrabold" [class]="s.valueColor">{{ s.value }}</span>
              <span
                class="flex w-fit items-center gap-1 rounded-full px-2 py-0.5 text-xs font-semibold"
                [class.bg-green-100]="s.trend === 'up'"
                [class.text-green-700]="s.trend === 'up'"
                [class.bg-red-100]="s.trend === 'down'"
                [class.text-red-600]="s.trend === 'down'"
              >
                <ui-icon
                  [name]="s.trend === 'up' ? 'trending_up' : 'trending_down'"
                  class="text-sm"
                />
                {{ s.delta }}
              </span>
            </div>
            <div class="flex h-12 w-12 items-center justify-center rounded-xl" [class]="s.iconBg">
              <ui-icon [name]="s.icon" class="text-2xl" [class]="s.iconFg" />
            </div>
          </div>
        </div>
      }
    </section>

    <section class="surface flex min-h-105 flex-1 flex-col rounded-3xl p-4 shadow-sm sm:p-6">
      <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <ui-segmented [options]="categories" [value]="activeCategory()" (valueChange)="selectCategory($any($event))" />
        <div class="flex items-center gap-2">
          <ui-date-selector [value]="activeYear()" />
          <ui-segmented [options]="ranges" [value]="activeRange()" (valueChange)="selectRange($any($event))" />
        </div>
      </div>

      <div
        class="flex min-h-65 flex-1 items-center justify-center rounded-2xl border border-gray-100 bg-gray-50 p-4 text-sm font-medium text-gray-400"
      >
        No data
      </div>
    </section>
  </main>
</div>
