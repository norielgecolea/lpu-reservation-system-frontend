<form
    [formGroup]="form"
    (ngSubmit)="save()"
    autocomplete="off"
    class="bg-white/45 backdrop-blur-xl backdrop-saturate-150 ring-1 ring-inset ring-white/60 shadow-[inset_0_1px_0_rgba(255,255,255,0.8),0_16px_40px_-12px_rgba(24,24,27,0.18)] animate-rise flex min-h-0 flex-1 flex-col overflow-hidden rounded-2xl"
  >
    <div class="mx-5 border-b border-primary/30 py-3.5 sm:mx-7">
      <div class="flex items-center gap-3 text-primary">
        <ui-icon name="person_add" class="text-2xl" />
        <h2 class="text-xl font-black">ADD USER</h2>
      </div>
    </div>

    <ui-form-feedback
      [saving]="saving()"
      savingText="Saving user..."
      [error]="error()"
      (dismissed)="error.set(null)"
    />

    <div class="flex-1 overflow-y-auto p-5 lg:p-7">
      <div class="grid content-start gap-5 sm:grid-cols-2">
        <div class="flex flex-col gap-1.5 sm:col-span-2">
          <label for="add-user-fullname" class="text-sm font-bold text-gray-800">Full Name</label>
          <input
            uiInput
            id="add-user-fullname"
            name="addUserFullname"
            type="text"
            formControlName="fullname"
            autocomplete="off"
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="add-user-employee-id" class="text-sm font-bold text-gray-800">
            Employee ID
          </label>
          <input
            uiInput
            id="add-user-employee-id"
            name="addUserEmployeeId"
            type="text"
            formControlName="employeeId"
            autocomplete="off"
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="add-user-email" class="text-sm font-bold text-gray-800">Email</label>
          <input
            uiInput
            id="add-user-email"
            name="addUserEmail"
            type="email"
            formControlName="email"
            autocomplete="off"
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="add-user-username" class="text-sm font-bold text-gray-800">Username</label>
          <input
            uiInput
            id="add-user-username"
            name="addUserUsername"
            type="text"
            formControlName="username"
            autocomplete="off"
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="add-user-password" class="text-sm font-bold text-gray-800">Password</label>
          <div class="relative">
            <input
              uiInput
              id="add-user-password"
              name="addUserPassword"
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              autocomplete="new-password"
              class="pr-10"
            />
            <button
              type="button"
              (click)="showPassword.set(!showPassword())"
              [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
              [attr.aria-pressed]="showPassword()"
              class="absolute inset-y-0 right-0 flex cursor-pointer items-center px-3 text-gray-200 hover:text-primary focus-visible:text-primary focus-visible:outline-none"
            >
              <ui-icon
                [name]="showPassword() ? 'visibility_off' : 'visibility'"
                class="text-xl leading-none"
              />
            </button>
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-bold text-gray-800">User Role</label>
          <ui-select formControlName="role" placeholder="Select a role" [options]="roles" />
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="add-user-confirm-password" class="text-sm font-bold text-gray-800">
            Confirm Password
          </label>
          <div class="relative">
            <input
              uiInput
              id="add-user-confirm-password"
              name="addUserConfirmPassword"
              [type]="showConfirm() ? 'text' : 'password'"
              formControlName="confirmPassword"
              autocomplete="new-password"
              class="pr-10"
            />
            <button
              type="button"
              (click)="showConfirm.set(!showConfirm())"
              [attr.aria-label]="showConfirm() ? 'Hide password' : 'Show password'"
              [attr.aria-pressed]="showConfirm()"
              class="absolute inset-y-0 right-0 flex cursor-pointer items-center px-3 text-gray-200 hover:text-primary focus-visible:text-primary focus-visible:outline-none"
            >
              <ui-icon
                [name]="showConfirm() ? 'visibility_off' : 'visibility'"
                class="text-xl leading-none"
              />
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="mx-5 mt-auto flex flex-col-reverse gap-3 border-t border-primary/30 py-3 sm:mx-7 sm:flex-row sm:justify-end"
    >
      <a uiButton variant="secondary" routerLink="/users"> CANCEL </a>
      <button uiButton type="submit" [disabled]="saving()">
        <span>SAVE</span>
      </button>
    </div>
  </form>
