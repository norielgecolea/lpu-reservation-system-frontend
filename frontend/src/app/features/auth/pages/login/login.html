<div
  class="relative flex min-h-dvh w-full items-center justify-center overflow-hidden bg-gray-400 p-2 sm:p-6"
>
  <div
    class="absolute inset-0 bg-cover bg-center opacity-30"
    style="background-image: url('/background.webp')"
    aria-hidden="true"
  ></div>

  <div
    class="surface relative z-10 grid w-full max-w-5xl overflow-hidden rounded-xl border-0! md:grid-cols-[1.05fr_0.95fr]"
  >
    <div class="relative hidden min-h-155 overflow-hidden bg-gray-400 md:block">
      <img src="/lpu-building.webp" alt="LPU Laguna campus" class="h-full w-full object-cover" />
    </div>

    <div
      class="relative flex flex-col justify-center gap-6 px-5 py-8 sm:gap-8 sm:px-10 sm:py-10 md:py-14 bg-gray-100"
    >
      <header class="relative flex items-center gap-3 sm:gap-4">
        <img
          src="/logo.svg"
          alt="LPU Laguna"
          class="h-14 w-14 shrink-0 object-contain sm:h-20 sm:w-20"
        />
        <h1 class="text-xl font-black leading-tight text-black sm:whitespace-nowrap sm:text-3xl">
          LPU - Laguna<br />Reservation System
        </h1>
      </header>

      <form
        [formGroup]="form"
        (ngSubmit)="submit()"
        class="relative flex flex-col gap-4 sm:gap-5"
        novalidate
      >
        <div class="flex flex-col gap-1.5">
          <input
            uiInput
            id="username"
            type="text"
            autocomplete="username"
            placeholder="Username"
            formControlName="username"
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <div class="relative">
            <input
              uiInput
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              autocomplete="current-password"
              placeholder="Password"
              formControlName="password"
              class="pr-10"
            />
            <button
              type="button"
              (click)="showPassword.set(!showPassword())"
              [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
              [attr.aria-pressed]="showPassword()"
              class="absolute inset-y-0 right-0 flex items-center px-3 text-gray-400 transition-colors duration-200 hover:text-secondary focus-visible:text-primary focus-visible:outline-none"
            >
              <ui-icon [name]="showPassword() ? 'visibility_off' : 'visibility'" class="text-xl" />
            </button>
          </div>
        </div>

        @if (error()) {
          <p
            class="rounded-lg border border-red-100 bg-red-50 px-3 py-2 text-sm font-medium text-red-600"
          >
            {{ error() }}
          </p>
        }

        <div class="flex items-center justify-between gap-4">
          <label uiLabel class="flex items-center gap-2">
            <input type="checkbox" uiCheckbox formControlName="remember" />
            <span>Remember me</span>
          </label>

          <a
            href="#"
            class="text-sm font-semibold text-secondary transition-colors duration-200 hover:text-primary"
          >
            Forgot Password
          </a>
        </div>

        <button uiButton type="submit" class="w-full py-2.5 sm:py-3" [disabled]="loading()">
          {{ loading() ? 'Signing in...' : 'Login' }}
        </button>
      </form>
    </div>
  </div>
</div>
